# Протокол исследования (study analysis plan).
# ЕДИНСТВЕННОЕ место, где живут клинические/методические решения.
# Меняя их здесь, ты меняешь весь анализ детерминированно — без правок в коде.

study:
  title: "Антибиотикопрофилактика при внутридетрузорном введении БТА у пациентов с последствиями спинальной травмы"
  unit_of_analysis: procedure          # procedure | patient — ключевое решение кейса
  inclusion:
    min_age: 18                        # строго 18+

endpoints:
  primary:
    name: "Отсутствие симптомной ИМВП в течение 5 суток после БТА"
    window_days: 5
  secondary:
    - "Постпроцедурная бактериурия по повторному посеву"
    - "Отдалённая ИМВП"

definitions:
  significant_bacteriuria_log10_cfu: 5   # порог значимого титра, КОЕ/мл = 10^5
  # как трактовать сомнительный случай (субфебрилитет без явной ИМВП):
  #   conservative -> считать ИМВП; strict -> не считать; sensitivity -> оба варианта
  ambiguous_uti_policy: sensitivity

assumptions:
  # если в данных нет пометки о резистентности — возбудитель считается
  # чувствительным к профилактическому антибиотику
  unmarked_susceptibility: susceptible

screening:
  # окно «свежести» теста до процедуры, в пределах которого результат
  # считается клинически релевантным
  fresh_window_days: 7

stats:
  alpha: 0.05
  bayes_prior: [1, 1]                   # Beta(1,1) — неинформативный априор
  power_event_threshold: 5              # ниже — явное предупреждение о мощности
